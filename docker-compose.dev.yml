# Spin up ONLY the database locally (for dev without Docker for app code)
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: educore_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: educore
      POSTGRES_PASSWORD: educore_secret
      POSTGRES_DB: educore
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U educore -d educore']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
