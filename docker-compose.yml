version: '3.9'

services:
  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: educore_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: educore
      POSTGRES_PASSWORD: educore_secret
      POSTGRES_DB: educore
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U educore -d educore']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NestJS Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: educore_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://educore:educore_secret@postgres:5432/educore?schema=public
      JWT_ACCESS_SECRET: change_me_access_secret_32chars_min
      JWT_REFRESH_SECRET: change_me_refresh_secret_32chars_min
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
    ports:
      - '3001:3001'
    volumes:
      - ./backend/src:/app/src   # hot-reload in dev

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: educore_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      NEXT_PUBLIC_APP_NAME: EduCore
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - '3000:3000'

volumes:
  postgres_data:
